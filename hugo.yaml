baseURL: https://xnu.ivx.run
title: Dissecting Apple
languageCode: en-us
enableRobotsTXT: true
enableGitInfo: true
# hasCJKLanguage: false

module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    style: github-dark

params:
  description: Tracking Apple platform CVEs and security advisories — automated weekly from Apple Security Releases and NVD.

  theme:
    default: dark
    displayToggle: true

  footer:
    enable: true
    displayCopyright: true
    displayPoweredBy: false

  editURL:
    enable: true
    base: "https://github.com/0xcrypto/applesec/edit/main"

  search:
    enable: true
    type: flexsearch
    flexsearch:
      index: title
      tokenize: forward

  blog:
    list:
      displayTags: true

menu:
  main:
    - name: iOS
      url: /iOS/
      weight: 1
    - name: macOS
      url: /macOS/
      weight: 2
    - name: iPadOS
      url: /iPadOS/
      weight: 3
    - name: Safari
      url: /Safari/
      weight: 4
    - name: Xcode
      url: /Xcode/
      weight: 5
    - identifier: more
      name: More ▾
      weight: 6
    - name: watchOS
      url: /watchOS/
      parent: more
      weight: 1
    - name: tvOS
      url: /tvOS/
      parent: more
      weight: 2
    - name: visionOS
      url: /visionOS/
      parent: more
      weight: 3
    - name: Search
      weight: 7
      params:
        type: search
    - name: GitHub ↗
      url: https://github.com/0xcrypto/applesec
      weight: 99
      params:
        type: icon
        icon: github
